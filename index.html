
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Verification Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white shadow-lg rounded-2xl p-8 max-w-md w-full text-center">
        
        <h1 class="text-2xl font-bold text-gray-800 mb-4">
            Personal Verification Page
        </h1>

        <div class="text-gray-700 space-y-2">
            <p class="text-lg">
                <span class="font-semibold">Name:</span> YOUR NAME
            </p>
            <p class="text-lg">
                <span class="font-semibold">Email:</span> YOUR EMAIL
            </p>
        </div>

        <div class="mt-6 text-sm text-gray-500">
            <p>
                This page is used for OpenReview identity verification.
            </p>
            <p class="mt-2">
                I confirm that I am the owner of this email address.
            </p>
        </div>

    </div>

</body>
</html>
